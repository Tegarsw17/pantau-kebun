name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      VITE_ADMIN_ACCESS_KEY: ${{ secrets.VITE_ADMIN_ACCESS_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          CLEAN_HOST=$(echo "$VPS_HOST" | tr -d '\r' | xargs)
          CLEAN_PORT=$(echo "$VPS_PORT" | tr -d '\r' | xargs)
          PORT="${CLEAN_PORT:-22}"

          mkdir -p /home/runner/.ssh
          chmod 700 /home/runner/.ssh
          echo "$VPS_SSH_KEY" | tr -d '\r' > /home/runner/.ssh/id_ed25519
          chmod 600 /home/runner/.ssh/id_ed25519

          echo "=== MEMULAI DIAGNOSIS JARINGAN ==="
          echo "Mengecek apakah IP/Domain bisa dijangkau dari server GitHub..."
          
          # Menggunakan Netcat dengan timeout 10 detik untuk melihat respons asli port
          nc -zv -w 10 "$CLEAN_HOST" "$PORT"
          
          echo "Jalur aman! Melanjutkan ke ssh-keyscan..."
          ssh-keyscan -p "$PORT" -H "$CLEAN_HOST" > /home/runner/.ssh/known_hosts

      - name: Ensure target directory exists
        run: |
          set -eu
          PORT="${VPS_PORT:-22}"

          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_TARGET_DIR'"

      - name: Deploy dist to VPS
        run: |
          set -eu
          PORT="${VPS_PORT:-22}"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $PORT" \
            dist/ "$VPS_USER@$VPS_HOST:$VPS_TARGET_DIR/"
