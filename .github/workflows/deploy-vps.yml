name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      VITE_ADMIN_ACCESS_KEY: ${{ secrets.VITE_ADMIN_ACCESS_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          PORT="${VPS_PORT:-22}"
          
          # 1. Pastikan folder .ssh dibuat dengan jalur absolut & aman
          mkdir -p /home/runner/.ssh
          chmod 700 /home/runner/.ssh
          
          # 2. Masukkan SSH Key ke dalam file id_ed25519
          echo "$VPS_SSH_KEY" > /home/runner/.ssh/id_ed25519
          chmod 600 /home/runner/.ssh/id_ed25519
          
          echo "Mencoba mengambil fingerprint SSH dari $VPS_HOST pada port $PORT..."
          
          # 3. Jalankan scanning port dan langsung masukkan ke known_hosts
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" > /home/runner/.ssh/known_hosts
          
          # 4. VALIDASI: Cek apakah file known_hosts berhasil terisi atau kosong
          if [ ! -s /home/runner/.ssh/known_hosts ]; then
            echo "================================================================"
            echo "ERROR: ssh-keyscan GAGAL total!"
            echo "GitHub Actions tidak bisa terhubung ke VPS Anda."
            echo "Silakan cek kembali 2 hal ini di GitHub Secrets Anda:"
            echo "1. Apakah VPS_HOST sudah benar? (Hanya IP/Domain, tanpa http://)"
            echo "2. Apakah VPS_PORT sudah benar? (Default: 22)"
            echo "================================================================"
            exit 1
          fi
          
          echo "Fingerprint SSH berhasil disimpan ke known_hosts!"

      - name: Ensure target directory exists
        run: |
          set -eu
          PORT="${VPS_PORT:-22}"

          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_TARGET_DIR'"

      - name: Deploy dist to VPS
        run: |
          set -eu
          PORT="${VPS_PORT:-22}"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $PORT" \
            dist/ "$VPS_USER@$VPS_HOST:$VPS_TARGET_DIR/"
