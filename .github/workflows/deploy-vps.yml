name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      VITE_ADMIN_ACCESS_KEY: ${{ secrets.VITE_ADMIN_ACCESS_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          # 1. Bersihkan variabel dari karakter gaib (\r atau spasi di ujung) akibat copy-paste
          CLEAN_HOST=$(echo "$VPS_HOST" | tr -d '\r' | xargs)
          CLEAN_PORT=$(echo "$VPS_PORT" | tr -d '\r' | xargs)
          PORT="${CLEAN_PORT:-22}"

          # 2. Pastikan folder .ssh siap
          mkdir -p /home/runner/.ssh
          chmod 700 /home/runner/.ssh

          # 3. Masukkan SSH Key dan bersihkan juga dari crack baris Windows (\r)
          echo "$VPS_SSH_KEY" | tr -d '\r' > /home/runner/.ssh/id_ed25519
          chmod 600 /home/runner/.ssh/id_ed25519

          echo "Mencoba mengambil fingerprint dari $CLEAN_HOST pada port $PORT..."
          
          # 4. Jalankan ssh-keyscan dan tampung hasilnya (termasuk errornya) ke file
          # Kita tambahkan '|| BUG_EXIT=$?' agar bash tidak langsung mati saat command ini gagal
          ssh-keyscan -p "$PORT" -H "$CLEAN_HOST" > /home/runner/.ssh/known_hosts 2>&1 || BUG_EXIT=$?
          
          # 5. VALIDASI KETAT: Jika gagal atau hasilnya kosong, bongkar isi errornya
          if [ ${BUG_EXIT:-0} -ne 0 ] || [ ! -s /home/runner/.ssh/known_hosts ]; then
            echo "================================================================"
            echo "SSH-KEYSCAN GAGAL TOTAL!"
            echo "Pesan Error Asli dari Sistem:"
            cat /home/runner/.ssh/known_hosts
            echo "----------------------------------------------------------------"
            echo "Rekomendasi tindakan:"
            echo "1. Periksa VPS_HOST di Secrets. Pastikan HANYA IP murni (contoh: 103.22.43.11)"
            echo "   atau domain murni (contoh: domainku.com). TANPA http:// atau ssh://"
            echo "2. Periksa VPS_PORT di Secrets. Pastikan HANYA angka (contoh: 22)"
            echo "================================================================"
            exit 1
          fi

          echo "Fingerprint SSH berhasil disimpan ke known_hosts!"

      - name: Ensure target directory exists
        run: |
          set -eu
          PORT="${VPS_PORT:-22}"

          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_TARGET_DIR'"

      - name: Deploy dist to VPS
        run: |
          set -eu
          PORT="${VPS_PORT:-22}"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $PORT" \
            dist/ "$VPS_USER@$VPS_HOST:$VPS_TARGET_DIR/"
